    <!-- bee (Hive) -->
    <g transform="translate(58,250) rotate(-10)">
      <ellipse cx="0" cy="0" rx="14" ry="9"/>
      <path d="M-5,-8 v16 M2,-8.5 v17 M9,-6 v12"/>
      <path d="M-14,-3 c-12,-12 -16,4 -4,4 M14,-3 c12,-12 16,4 4,4"/>
      <path d="M-13,-9 l-6,-7 M-11,-11 l-3,-8"/>
