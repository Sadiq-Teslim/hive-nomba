    <!-- sparkle -->
    <g transform="translate(122,358)">
      <path d="M0,-16 C2,-4 4,-2 16,0 4,2 2,4 0,16 -2,4 -4,2 -16,0 -4,-2 -2,-4 0,-16 z"/>
