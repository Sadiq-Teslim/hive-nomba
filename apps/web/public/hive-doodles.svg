    <!-- honeycomb -->
    <g transform="translate(182,262)">
      <path d="M0,-16 l13,7 v14 l-13,7 -13,-7 v-14 z"/>
      <path d="M26,-1 l13,7 v14 l-13,7 -13,-7"/>
