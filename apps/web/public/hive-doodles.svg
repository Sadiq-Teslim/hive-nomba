<svg xmlns="http://www.w3.org/2000/svg" width="440" height="440" viewBox="0 0 440 440">
  <g fill="none" stroke="#f5c518" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.09">
    <!-- shopping bag -->
    <g transform="translate(58,62)">
      <path d="M-20,-10 h40 l4,42 h-48 z"/>
      <path d="M-11,-10 a11,11 0 0 1 22,0"/>
    </g>
    <!-- price tag -->
    <g transform="translate(180,54) rotate(-18)">
      <path d="M-22,-12 h20 l14,12 -14,12 h-20 z"/>
      <circle cx="-8" cy="0" r="3.5"/>
    </g>
    <!-- chat bubble -->
    <g transform="translate(300,58)">
      <rect x="-22" y="-16" width="44" height="30" rx="8"/>
      <path d="M-8,14 v9 l10,-9"/>
      <path d="M-12,-3 h24 M-12,4 h16"/>
    </g>
    <!-- smartphone -->
    <g transform="translate(392,132) rotate(12)">
      <rect x="-13" y="-24" width="26" height="48" rx="6"/>
