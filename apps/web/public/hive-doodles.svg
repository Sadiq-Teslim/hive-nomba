    <g transform="translate(20,150)"><path d="M0,-7 C1,-2 2,-1 7,0 2,1 1,2 0,7 -1,2 -2,1 -7,0 -2,-1 -1,-2 0,-7 z"/></g>
    <g transform="translate(420,210)"><path d="M0,-7 C1,-2 2,-1 7,0 2,1 1,2 0,7 -1,2 -2,1 -7,0 -2,-1 -1,-2 0,-7 z"/></g>
    <g transform="translate(160,120)"><circle cx="0" cy="0" r="3"/></g>
    <g transform="translate(330,150)"><circle cx="0" cy="0" r="3"/></g>
    <g transform="translate(90,330)"><circle cx="0" cy="0" r="3"/></g>
    <g transform="translate(250,310)"><circle cx="0" cy="0" r="3"/></g>
    <g transform="translate(150,430)"><path d="M0,-7 C1,-2 2,-1 7,0 2,1 1,2 0,7 -1,2 -2,1 -7,0 -2,-1 -1,-2 0,-7 z"/></g>
